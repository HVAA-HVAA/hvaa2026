<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School / Club - HVAA2026</title>
  <style>
    /* ── RESET ── */
    * { margin:0; padding:0; box-sizing:border-box; }

    /* ── TYPOGRAPHY & BASE ── */
    body {
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f0f4ff;
        color: #1a1a2e;
        min-height: 100vh;
    }

    /* ── NAV ── */
    header {
        background: #ffffff;
        border-bottom: 3px solid #4f46e5;
        padding: 0;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 12px rgba(79,70,229,0.10);
    }
    .nav-inner {
        max-width: 1300px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
    }
    .nav-logo {
        font-size: 1.25rem;
        font-weight: 800;
        color: #4f46e5;
        letter-spacing: 1px;
        padding: 0.9rem 0;
        white-space: nowrap;
        margin-right: 2rem;
    }
    nav ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 0;
    }
    nav a {
        color: #444;
        text-decoration: none;
        padding: 0.9rem 1.1rem;
        font-weight: 600;
        font-size: 0.92rem;
        display: block;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        margin-bottom: -3px;
    }
    nav a:hover  { color: #4f46e5; border-bottom-color: #a5b4fc; }
    nav a.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* ── PAGE WRAPPER ── */
    main { padding-top: 72px; padding-bottom: 3rem; }

    /* ── PAGE HERO ── */
    .page-hero {
        background: linear-gradient(120deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%);
        color: white;
        padding: 2.5rem 1.5rem 2rem;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .page-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 70% 50%, rgba(255,255,255,0.08) 0%, transparent 70%);
    }
    .page-hero h1 { font-size: 2rem; font-weight: 800; letter-spacing: 2px; position: relative; }
    .page-hero p  { font-size: 0.95rem; opacity: 0.88; margin-top: 0.4rem; position: relative; }
    .hero-icon    { font-size: 2.8rem; margin-bottom: 0.4rem; display: block; }

    /* ── CONTROLS BAR ── */
    .controls {
        max-width: 1300px;
        margin: 1.2rem auto 0.8rem;
        padding: 0.85rem 1.2rem;
        background: #ffffff;
        border-radius: 12px;
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
        align-items: center;
        box-shadow: 0 2px 10px rgba(79,70,229,0.08);
        border: 1px solid #e0e7ff;
    }
    .controls input, .controls select {
        padding: 0.5rem 0.85rem;
        border: 1.5px solid #c7d2fe;
        border-radius: 8px;
        font-size: 0.88rem;
        background: #f8f9ff;
        color: #1a1a2e;
        transition: border 0.2s;
    }
    .controls input:focus, .controls select:focus {
        outline: none;
        border-color: #4f46e5;
        background: #fff;
    }
    .controls input { flex: 1; min-width: 200px; }
    .controls select { min-width: 150px; }
    .count-badge {
        margin-left: auto;
        font-size: 0.85rem;
        color: #6366f1;
        font-weight: 600;
        white-space: nowrap;
    }

    /* ── BUTTONS ── */
    .btn {
        padding: 0.5rem 1.1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.88rem;
        transition: all 0.2s;
        letter-spacing: 0.3px;
    }
    .btn-primary  { background: #4f46e5; color: white; }
    .btn-primary:hover  { background: #4338ca; }
    .btn-accent   { background: #ec4899; color: white; }
    .btn-accent:hover   { background: #db2777; }
    .btn-success  { background: #10b981; color: white; }
    .btn-success:hover  { background: #059669; }
    .btn-outline  { background: white; color: #4f46e5; border: 1.5px solid #c7d2fe; }
    .btn-outline:hover  { background: #eef2ff; }

    /* ── ALERTS ── */
    #alerts { max-width:1300px; margin:0 auto 0.5rem; padding:0 1.2rem; display:none; }
    #alert-inner { padding:0.8rem 1.2rem; border-radius:10px; font-weight:600; font-size:0.9rem; }
    .alert-ok  { background: #d1fae5; color: #065f46; border:1.5px solid #6ee7b7; }
    .alert-err { background: #fee2e2; color: #991b1b; border:1.5px solid #fca5a5; }

    /* ── TABLE ── */
    .table-wrap { max-width:1300px; margin:0 auto; padding:0 1.2rem; overflow-x:auto; }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(79,70,229,0.08);
        border: 1px solid #e0e7ff;
    }
    thead tr { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
    th {
        padding: 0.85rem 0.75rem;
        color: white;
        text-align: left;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
    }
    th:hover { background: rgba(255,255,255,0.12); }
    th.sort-asc::after  { content: " ▲"; }
    th.sort-desc::after { content: " ▼"; }
    td {
        padding: 0.7rem 0.75rem;
        font-size: 0.9rem;
        border-bottom: 1px solid #f0f0ff;
        vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f5f3ff; }
    tbody tr.violation td { background: #fff7ed !important; }

    /* ── BIB BADGES ── */
    .bib { display:inline-block; font-weight:800; font-size:0.82rem; padding:0.2rem 0.6rem; border-radius:6px; color:white; letter-spacing:1px; }
    .bib-B { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .bib-G { background: linear-gradient(135deg, #ec4899, #db2777); }

    /* ── CATEGORY BADGES ── */
    .cat-badge { display:inline-block; font-size:0.78rem; padding:0.18rem 0.55rem; border-radius:6px; font-weight:700; }
    .cat-B { background:#ede9fe; color:#5b21b6; }
    .cat-G { background:#fce7f3; color:#9d174d; }

    /* ── EVENT BADGES ── */
    .ev { display:inline-block; background:#e0e7ff; color:#3730a3; font-size:0.73rem; padding:0.15rem 0.5rem; border-radius:20px; font-weight:700; margin:1px; }
    .ev.empty { display:none; }

    /* ── STAT CARDS ── */
    .stat-strip { max-width:1300px; margin:1.2rem auto; padding:0 1.2rem; display:flex; gap:0.8rem; flex-wrap:wrap; justify-content:center; }
    .stat-card {
        background: white;
        border-radius: 12px;
        padding: 0.9rem 1.8rem;
        text-align: center;
        min-width: 130px;
        box-shadow: 0 2px 10px rgba(79,70,229,0.08);
        border: 1px solid #e0e7ff;
        flex: 1;
        max-width: 200px;
    }
    .stat-card .num  { font-size: 1.8rem; font-weight: 800; color: #4f46e5; line-height: 1; }
    .stat-card .lbl  { font-size: 0.72rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.25rem; }

    /* ── LINKS ── */
    a.row-link { font-size:0.8rem; color:#4f46e5; text-decoration:none; font-weight:600; }
    a.row-link:hover { text-decoration:underline; }

    /* ── GROUP ROW ── */
    .group-row td {
        background: linear-gradient(90deg, #eef2ff, #f5f3ff);
        font-weight: 700;
        font-size: 0.82rem;
        color: #4338ca;
        letter-spacing: 0.5px;
        padding: 0.45rem 0.75rem;
        border-bottom: 1px solid #c7d2fe;
    }

    /* ── PAGINATION ── */
    .pagination { display:flex; justify-content:center; gap:0.4rem; margin:1.2rem 1rem; flex-wrap:wrap; }
    .pg-btn { padding:0.38rem 0.9rem; border:1.5px solid #c7d2fe; border-radius:7px; cursor:pointer; background:white; color:#4f46e5; font-weight:700; font-size:0.88rem; transition:all 0.2s; }
    .pg-btn:hover, .pg-btn.active { background:#4f46e5; color:white; border-color:#4f46e5; }

    /* ── CLUB CARD ── */
    .clubs-wrap  { max-width:1300px; margin:0 auto; padding:0 1.2rem; display:flex; flex-direction:column; gap:1.2rem; }
    .club-card   { background:white; border-radius:14px; overflow:hidden; box-shadow:0 4px 16px rgba(79,70,229,0.08); border:1px solid #e0e7ff; }
    .club-header { background:linear-gradient(90deg,#4f46e5,#7c3aed); color:white; padding:0.85rem 1.2rem; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .club-header:hover { filter:brightness(1.06); }
    .club-name   { font-size:1rem; font-weight:700; letter-spacing:0.3px; display:flex; align-items:center; gap:0.5rem; }
    .club-meta   { display:flex; gap:0.8rem; align-items:center; font-size:0.85rem; opacity:0.92; }
    .club-count  { background:rgba(255,255,255,0.22); padding:0.18rem 0.65rem; border-radius:20px; font-weight:700; }
    .toggle-icon { font-size:1rem; transition:transform 0.25s; display:inline-block; }
    .club-card.collapsed .toggle-icon { transform:rotate(-90deg); }
    .club-body   { overflow:hidden; transition:max-height 0.3s ease; }
    .club-card.collapsed .club-body { max-height:0 !important; }

    /* ── ACTION BAR ── */
    .action-bar { max-width:1300px; margin:0 auto 0.6rem; padding:0 1.2rem; display:flex; gap:0.5rem; flex-wrap:wrap; }

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
        .nav-inner { flex-wrap:wrap; }
        .nav-logo  { margin-right:auto; }
        nav ul     { width:100%; overflow-x:auto; }
        nav a      { padding:0.6rem 0.8rem; font-size:0.85rem; }
        .controls  { flex-direction:column; }
        th, td     { font-size:0.78rem; padding:0.55rem 0.45rem; }
        .stat-card { min-width:100px; padding:0.7rem 1rem; }
    }

    .club-body table thead tr { background: #f5f3ff; }
    .club-body th { color: #4338ca; font-size:0.76rem; padding:0.6rem 0.8rem; border-bottom:2px solid #e0e7ff; }
    .club-body th:hover { background:#ede9fe; }
    .club-body td { padding:0.6rem 0.8rem; font-size:0.88rem; }
  </style>
</head>
<body>
<header>
  <div class="nav-inner">
    <span class="nav-logo">HVAA<span style="color:#ec4899">2026</span></span>
    <nav><ul><li><a href="index.html">🏠 Home</a></li>
<li><a href="entry-list.html">📋 Entry List</a></li>
<li><a href="athletes.html">🏃 Athletes</a></li>
<li><a href="events.html">🏁 Events</a></li>
<li><a href="school-club.html" class="active">🏫 School / Club</a></li>
</ul></nav>
  </div>
</header>
<main>
  <div class="page-hero">
    <span class="hero-icon">🏫</span>
    <h1>School / Club</h1>
    <p>Athletes grouped by team &mdash; sorted by Bib number within each club</p>
  </div>

  <div class="stat-strip">
    <div class="stat-card"><div class="num" id="statClubs">—</div><div class="lbl">Clubs / Schools</div></div>
    <div class="stat-card"><div class="num" id="statAthletes">—</div><div class="lbl">Athletes</div></div>
    <div class="stat-card"><div class="num" id="statEntries">—</div><div class="lbl">Total Entries</div></div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="🔍  Search name (Eng / 中文), Bib…">
    <select id="catFilter"><option value="">All Categories</option></select>
    <span class="count-badge" id="rowCount"></span>
  </div>

  <div class="action-bar">
    <button class="btn btn-outline" onclick="toggleAll(false)">Expand All</button>
    <button class="btn btn-outline" onclick="toggleAll(true)">Collapse All</button>
  </div>

  <div class="clubs-wrap" id="clubsWrap">
    <p style="text-align:center;padding:3rem;color:#9ca3af">Loading…</p>
  </div>
</main>
<script>
let allData=[],filtered=[];

fetch('athletes_table.json').then(r=>r.json()).then(res=>{
  allData=res.data; filtered=allData;
  populateFilters(); updateStats(allData); renderClubs(allData);
}).catch(()=>document.getElementById('clubsWrap').innerHTML='<p style="text-align:center;padding:3rem;color:#9ca3af">Place <strong>athletes_table.json</strong> in site root.</p>');

function populateFilters(){
  const cats=[...new Set(allData.map(d=>d.Category))].sort();
  const sel=document.getElementById('catFilter');
  cats.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;sel.appendChild(o);});
}
function updateStats(data){
  const clubs=new Set(data.map(d=>d.School_Club)).size;
  const entries=data.reduce((s,d)=>s+[d.Event_1,d.Event_2,d.Event_3].filter(e=>e&&e.trim()).length,0);
  document.getElementById('statClubs').textContent=clubs;
  document.getElementById('statAthletes').textContent=data.length;
  document.getElementById('statEntries').textContent=entries;
  document.getElementById('rowCount').textContent=`${data.length} athletes across ${clubs} clubs`;
}
['search','catFilter'].forEach(id=>document.getElementById(id).addEventListener(id==='search'?'input':'change',applyFilters));
function applyFilters(){
  const term=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  filtered=allData.filter(r=>
    (!term||(r.Eng_name||'').toLowerCase().includes(term)||(r.Chinese_name||'').includes(term)||(r.Bib||'').toLowerCase().includes(term))&&
    (!cat||r.Category===cat)
  );
  updateStats(filtered); renderClubs(filtered);
}
function renderClubs(data){
  const map={};
  data.forEach(r=>{const c=r.School_Club||'Unknown';if(!map[c])map[c]=[];map[c].push(r);});
  const sorted=Object.keys(map).sort();
  let html='';
  sorted.forEach(club=>{
    const athletes=map[club].sort((a,b)=>(a.Bib||'').localeCompare(b.Bib||'',undefined,{numeric:true}));
    const count=athletes.length;
    const entries=athletes.reduce((s,r)=>s+[r.Event_1,r.Event_2,r.Event_3].filter(e=>e&&e.trim()).length,0);
    const id='club-'+club.replace(/[^a-z0-9]/gi,'_');
    html+=`<div class="club-card" id="${id}">
      <div class="club-header" onclick="toggleCard('${id}')">
        <span class="club-name">🏫 ${club}</span>
        <span class="club-meta">
          <span class="club-count">${count} athlete${count!==1?'s':''}</span>
          <span>${entries} entr${entries!==1?'ies':'y'}</span>
          <span class="toggle-icon">▾</span>
        </span>
      </div>
      <div class="club-body" style="max-height:${count*55+55}px">
        <table>
          <thead><tr><th>Bib</th><th>Eng Name</th><th>Chinese Name</th><th>Category</th><th>Events</th><th>Profile</th></tr></thead>
          <tbody>${athletes.map(r=>{
            const bibClass='bib bib-'+(r.Cat_Code&&r.Cat_Code.startsWith('B')?'B':'G');
            const catClass='cat-badge cat-'+(r.Cat_Code&&r.Cat_Code.startsWith('B')?'B':'G');
            const evs=[r.Event_1,r.Event_2,r.Event_3].map(e=>e&&e.trim()?`<span class="ev">${e}</span>`:'').join('');
            return `<tr>
              <td><span class="${bibClass}">${r.Bib||''}</span></td>
              <td>${r.Eng_name||''}</td><td>${r.Chinese_name||''}</td>
              <td><span class="${catClass}">${r.Category||''}</span></td>
              <td>${evs||'—'}</td>
              <td><a class="row-link" href="athletes.html?bib=${r.Bib}">Profile →</a></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  });
  document.getElementById('clubsWrap').innerHTML=html||'<p style="text-align:center;padding:2rem;color:#9ca3af">No results.</p>';
}
function toggleCard(id){document.getElementById(id).classList.toggle('collapsed');}
function toggleAll(collapse){document.querySelectorAll('.club-card').forEach(c=>collapse?c.classList.add('collapsed'):c.classList.remove('collapsed'));}
</script>
</body>
</html>
