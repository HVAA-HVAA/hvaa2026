<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athletes - HVAA2026</title>
  <style>
    /* ── RESET ── */
    * { margin:0; padding:0; box-sizing:border-box; }

    /* ── TYPOGRAPHY & BASE ── */
    body {
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f0f4ff;
        color: #1a1a2e;
        min-height: 100vh;
    }

    /* ── NAV ── */
    header {
        background: #ffffff;
        border-bottom: 3px solid #4f46e5;
        padding: 0;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 12px rgba(79,70,229,0.10);
    }
    .nav-inner {
        max-width: 1300px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
    }
    .nav-logo {
        font-size: 1.25rem;
        font-weight: 800;
        color: #4f46e5;
        letter-spacing: 1px;
        padding: 0.9rem 0;
        white-space: nowrap;
        margin-right: 2rem;
    }
    nav ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 0;
    }
    nav a {
        color: #444;
        text-decoration: none;
        padding: 0.9rem 1.1rem;
        font-weight: 600;
        font-size: 0.92rem;
        display: block;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        margin-bottom: -3px;
    }
    nav a:hover  { color: #4f46e5; border-bottom-color: #a5b4fc; }
    nav a.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* ── PAGE WRAPPER ── */
    main { padding-top: 72px; padding-bottom: 3rem; }

    /* ── PAGE HERO ── */
    .page-hero {
        background: linear-gradient(120deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%);
        color: white;
        padding: 2.5rem 1.5rem 2rem;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .page-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 70% 50%, rgba(255,255,255,0.08) 0%, transparent 70%);
    }
    .page-hero h1 { font-size: 2rem; font-weight: 800; letter-spacing: 2px; position: relative; }
    .page-hero p  { font-size: 0.95rem; opacity: 0.88; margin-top: 0.4rem; position: relative; }
    .hero-icon    { font-size: 2.8rem; margin-bottom: 0.4rem; display: block; }

    /* ── CONTROLS BAR ── */
    .controls {
        max-width: 1300px;
        margin: 1.2rem auto 0.8rem;
        padding: 0.85rem 1.2rem;
        background: #ffffff;
        border-radius: 12px;
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
        align-items: center;
        box-shadow: 0 2px 10px rgba(79,70,229,0.08);
        border: 1px solid #e0e7ff;
    }
    .controls input, .controls select {
        padding: 0.5rem 0.85rem;
        border: 1.5px solid #c7d2fe;
        border-radius: 8px;
        font-size: 0.88rem;
        background: #f8f9ff;
        color: #1a1a2e;
        transition: border 0.2s;
    }
    .controls input:focus, .controls select:focus {
        outline: none;
        border-color: #4f46e5;
        background: #fff;
    }
    .controls input { flex: 1; min-width: 200px; }
    .controls select { min-width: 150px; }
    .count-badge {
        margin-left: auto;
        font-size: 0.85rem;
        color: #6366f1;
        font-weight: 600;
        white-space: nowrap;
    }

    /* ── BUTTONS ── */
    .btn {
        padding: 0.5rem 1.1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.88rem;
        transition: all 0.2s;
        letter-spacing: 0.3px;
    }
    .btn-primary  { background: #4f46e5; color: white; }
    .btn-primary:hover  { background: #4338ca; }
    .btn-accent   { background: #ec4899; color: white; }
    .btn-accent:hover   { background: #db2777; }
    .btn-success  { background: #10b981; color: white; }
    .btn-success:hover  { background: #059669; }
    .btn-outline  { background: white; color: #4f46e5; border: 1.5px solid #c7d2fe; }
    .btn-outline:hover  { background: #eef2ff; }

    /* ── ALERTS ── */
    #alerts { max-width:1300px; margin:0 auto 0.5rem; padding:0 1.2rem; display:none; }
    #alert-inner { padding:0.8rem 1.2rem; border-radius:10px; font-weight:600; font-size:0.9rem; }
    .alert-ok  { background: #d1fae5; color: #065f46; border:1.5px solid #6ee7b7; }
    .alert-err { background: #fee2e2; color: #991b1b; border:1.5px solid #fca5a5; }

    /* ── TABLE ── */
    .table-wrap { max-width:1300px; margin:0 auto; padding:0 1.2rem; overflow-x:auto; }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(79,70,229,0.08);
        border: 1px solid #e0e7ff;
    }
    thead tr { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
    th {
        padding: 0.85rem 0.75rem;
        color: white;
        text-align: left;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
    }
    th:hover { background: rgba(255,255,255,0.12); }
    th.sort-asc::after  { content: " ▲"; }
    th.sort-desc::after { content: " ▼"; }
    td {
        padding: 0.7rem 0.75rem;
        font-size: 0.9rem;
        border-bottom: 1px solid #f0f0ff;
        vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f5f3ff; }
    tbody tr.violation td { background: #fff7ed !important; }

    /* ── BIB BADGES ── */
    .bib { display:inline-block; font-weight:800; font-size:0.82rem; padding:0.2rem 0.6rem; border-radius:6px; color:white; letter-spacing:1px; }
    .bib-B { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .bib-G { background: linear-gradient(135deg, #ec4899, #db2777); }

    /* ── CATEGORY BADGES ── */
    .cat-badge { display:inline-block; font-size:0.78rem; padding:0.18rem 0.55rem; border-radius:6px; font-weight:700; }
    .cat-B { background:#ede9fe; color:#5b21b6; }
    .cat-G { background:#fce7f3; color:#9d174d; }

    /* ── EVENT BADGES ── */
    .ev { display:inline-block; background:#e0e7ff; color:#3730a3; font-size:0.73rem; padding:0.15rem 0.5rem; border-radius:20px; font-weight:700; margin:1px; }
    .ev.empty { display:none; }

    /* ── STAT CARDS ── */
    .stat-strip { max-width:1300px; margin:1.2rem auto; padding:0 1.2rem; display:flex; gap:0.8rem; flex-wrap:wrap; justify-content:center; }
    .stat-card {
        background: white;
        border-radius: 12px;
        padding: 0.9rem 1.8rem;
        text-align: center;
        min-width: 130px;
        box-shadow: 0 2px 10px rgba(79,70,229,0.08);
        border: 1px solid #e0e7ff;
        flex: 1;
        max-width: 200px;
    }
    .stat-card .num  { font-size: 1.8rem; font-weight: 800; color: #4f46e5; line-height: 1; }
    .stat-card .lbl  { font-size: 0.72rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.25rem; }

    /* ── LINKS ── */
    a.row-link { font-size:0.8rem; color:#4f46e5; text-decoration:none; font-weight:600; }
    a.row-link:hover { text-decoration:underline; }

    /* ── GROUP ROW ── */
    .group-row td {
        background: linear-gradient(90deg, #eef2ff, #f5f3ff);
        font-weight: 700;
        font-size: 0.82rem;
        color: #4338ca;
        letter-spacing: 0.5px;
        padding: 0.45rem 0.75rem;
        border-bottom: 1px solid #c7d2fe;
    }

    /* ── PAGINATION ── */
    .pagination { display:flex; justify-content:center; gap:0.4rem; margin:1.2rem 1rem; flex-wrap:wrap; }
    .pg-btn { padding:0.38rem 0.9rem; border:1.5px solid #c7d2fe; border-radius:7px; cursor:pointer; background:white; color:#4f46e5; font-weight:700; font-size:0.88rem; transition:all 0.2s; }
    .pg-btn:hover, .pg-btn.active { background:#4f46e5; color:white; border-color:#4f46e5; }

    /* ── CLUB CARD ── */
    .clubs-wrap  { max-width:1300px; margin:0 auto; padding:0 1.2rem; display:flex; flex-direction:column; gap:1.2rem; }
    .club-card   { background:white; border-radius:14px; overflow:hidden; box-shadow:0 4px 16px rgba(79,70,229,0.08); border:1px solid #e0e7ff; }
    .club-header { background:linear-gradient(90deg,#4f46e5,#7c3aed); color:white; padding:0.85rem 1.2rem; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .club-header:hover { filter:brightness(1.06); }
    .club-name   { font-size:1rem; font-weight:700; letter-spacing:0.3px; display:flex; align-items:center; gap:0.5rem; }
    .club-meta   { display:flex; gap:0.8rem; align-items:center; font-size:0.85rem; opacity:0.92; }
    .club-count  { background:rgba(255,255,255,0.22); padding:0.18rem 0.65rem; border-radius:20px; font-weight:700; }
    .toggle-icon { font-size:1rem; transition:transform 0.25s; display:inline-block; }
    .club-card.collapsed .toggle-icon { transform:rotate(-90deg); }
    .club-body   { overflow:hidden; transition:max-height 0.3s ease; }
    .club-card.collapsed .club-body { max-height:0 !important; }

    /* ── ACTION BAR ── */
    .action-bar { max-width:1300px; margin:0 auto 0.6rem; padding:0 1.2rem; display:flex; gap:0.5rem; flex-wrap:wrap; }

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
        .nav-inner { flex-wrap:wrap; }
        .nav-logo  { margin-right:auto; }
        nav ul     { width:100%; overflow-x:auto; }
        nav a      { padding:0.6rem 0.8rem; font-size:0.85rem; }
        .controls  { flex-direction:column; }
        th, td     { font-size:0.78rem; padding:0.55rem 0.45rem; }
        .stat-card { min-width:100px; padding:0.7rem 1rem; }
    }
</style>
</head>
<body>
<header>
  <div class="nav-inner">
    <span class="nav-logo">HVAA<span style="color:#ec4899">2026</span></span>
    <nav><ul><li><a href="index.html">🏠 Home</a></li>
<li><a href="entry-list.html">📋 Entry List</a></li>
<li><a href="athletes.html" class="active">🏃 Athletes</a></li>
<li><a href="events.html">🏁 Events</a></li>
<li><a href="school-club.html">🏫 School / Club</a></li>
</ul></nav>
  </div>
</header>
<main>
  <div class="page-hero">
    <span class="hero-icon">🏃</span>
    <h1>Athletes</h1>
    <p>One row per athlete &mdash; sorted by Category &rarr; School/Club &mdash; Bib auto-assigned</p>
  </div>

  <div id="debug-info" style="display:none;max-width:1300px;margin:.5rem auto;padding:.7rem 1.2rem;background:#fef3c7;border:1.5px solid #fbbf24;border-radius:10px;font-size:.85rem;color:#92400e"></div>
  <div class="controls">
    <input type="text" id="search" placeholder="🔍  Search name, Bib, HKAAA no…">
    <select id="catFilter"><option value="">All Categories</option></select>
    <select id="clubFilter"><option value="">All Schools / Clubs</option></select>
    <select id="genderFilter"><option value="">All Genders</option><option value="M">Male</option><option value="F">Female</option></select>
    <button class="btn btn-accent" onclick="validateRules()">⚡ Validate</button>
    <span class="count-badge" id="rowCount"></span>
  </div>
  <div id="alerts"><div id="alert-inner"></div></div>

  <div class="table-wrap">
    <table id="tbl">
      <thead><tr>
        <th data-col="Bib">Bib</th>
        <th data-col="Cat_Code">Code</th>
        <th data-col="Category">Category</th>
        <th data-col="School_Club">School / Club</th>
        <th data-col="Eng_name">Eng Name</th>
        <th>Chinese Name</th>
        <th>Event 1</th><th>Event 2</th><th>Event 3</th>
        <th>Entries</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</main>
<script>
const CAT_ORDER=['BA','BB','BC','BD','BE','BF','GA','GB','GC','GD','GE','GF'];
const PAGE=100; let allData=[],filtered=[],currentPage=1,sortKey='',sortAsc=true;

fetch('athletes_table.json').then(r=>r.json()).then(res=>{
  allData=res.data; 
  // Debug: show first record info
  if(allData.length > 0){
    const r0 = allData[0];
    const debugEl = document.getElementById('debug-info');
    if(debugEl){
      debugEl.style.display='block';
      debugEl.innerHTML = '<strong>✅ JSON loaded: ' + allData.length + ' records</strong><br>' +
        'First record keys: ' + Object.keys(r0).join(', ') + '<br>' +
        'Sample — Eng_name: <em>' + (r0.Eng_name||'MISSING') + '</em> | ' +
        'Cat_Code: <em>' + (r0.Cat_Code||'MISSING') + '</em> | ' +
        'Bib: <em>' + (r0.Bib||'MISSING') + '</em> | ' +
        'Category: <em>' + (r0.Category||'MISSING') + '</em>';
    }
  }
  populateFilters(); applyFilters();
}).catch((err)=>{
  document.getElementById('tbody').innerHTML=`<tr><td colspan="10" style="text-align:center;padding:2rem;color:#991b1b">
    <strong>⚠️ Could not load athletes_table.json</strong><br>
    <span style="font-size:.85rem;color:#6b7280">Error: ${err.message}</span><br>
    <span style="font-size:.85rem;color:#6b7280">Try opening: <a href="athletes_table.json" target="_blank">athletes_table.json</a> directly — if it loads, try a hard refresh (Ctrl+Shift+R / Cmd+Shift+R)</span>
  </td></tr>`;
  console.error('athletes_table.json load error:', err);
});

function populateFilters(){
  const cats=[...new Set(allData.map(d=>d.Category))].sort((a,b)=>{
    const ai=CAT_ORDER.indexOf(catCode(a)),bi=CAT_ORDER.indexOf(catCode(b));
    return ai-bi;
  });
  const clubs=[...new Set(allData.map(d=>d.School_Club))].sort();
  sel('catFilter',cats); sel('clubFilter',clubs);
}
function sel(id,arr){const el=document.getElementById(id);arr.forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;el.appendChild(o);});}
function catCode(cat){return {'男子U20':'BA','男子U18':'BB','男子U16':'BC','男子U14':'BD','男子U12':'BE','男子U10':'BF','女子U20':'GA','女子U18':'GB','女子U16':'GC','女子U14':'GD','女子U12':'GE','女子U10':'GF'}[cat]||'';}

['search','catFilter','clubFilter','genderFilter'].forEach(id=>document.getElementById(id).addEventListener(id==='search'?'input':'change',applyFilters));

function applyFilters(){
  const term=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const club=document.getElementById('clubFilter').value;
  const gender=document.getElementById('genderFilter').value;
  filtered=allData.filter(r=>
    (!term||(r.Eng_name||'').toLowerCase().includes(term)||(r.Chinese_name||'').includes(term)||(r.Bib||'').toLowerCase().includes(term)||(r.HKAAA_reg_no||'').toLowerCase().includes(term))&&
    (!cat||r.Category===cat)&&(!club||r.School_Club===club)&&(!gender||r.Gender===gender)
  );
  currentPage=1; renderPage();
}
function renderPage(){
  const start=(currentPage-1)*PAGE;
  const rows=filtered.slice(start,start+PAGE);
  let html='',lastCode='';
  const CAT_LABEL={'BA':'男子U20','BB':'男子U18','BC':'男子U16','BD':'男子U14','BE':'男子U12','BF':'男子U10','GA':'女子U20','GB':'女子U18','GC':'女子U16','GD':'女子U14','GE':'女子U12','GF':'女子U10'};
  rows.forEach(r=>{
    const code=r.Cat_Code||'';
    if(code!==lastCode){html+=`<tr class="group-row"><td colspan="10">${code} &mdash; ${CAT_LABEL[code]||r.Category}</td></tr>`;lastCode=code;}
    const bibClass='bib bib-'+(code.startsWith('B')?'B':'G');
    const catClass='cat-badge cat-'+(code.startsWith('B')?'B':'G');
    const ev=e=>e?`<span class="ev">${e}</span>`:'<span class="ev empty">—</span>';
    html+=`<tr>
      <td><span class="${bibClass}">${r.Bib||''}</span></td>
      <td><span class="${catClass}">${code}</span></td>
      <td>${r.Category||''}</td>
      <td>${r.School_Club||''}</td>
      <td>${r.Eng_name||''}</td>
      <td>${r.Chinese_name||''}</td>
      <td>${ev(r.Event_1)}</td><td>${ev(r.Event_2)}</td><td>${ev(r.Event_3)}</td>
      <td><a class="row-link" href="entry-list.html?id=${r.ID_number}">View &rarr;</a></td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="10" style="text-align:center;padding:2rem;color:#9ca3af">No results.</td></tr>';
  document.getElementById('rowCount').textContent=`${filtered.length} athletes`;
  renderPagination();
}
function renderPagination(){
  const total=Math.ceil(filtered.length/PAGE);
  const pg=document.getElementById('pagination');
  pg.innerHTML='';
  for(let p=1;p<=total;p++){const b=document.createElement('button');b.className='pg-btn'+(p===currentPage?' active':'');b.textContent=p;b.onclick=()=>{currentPage=p;renderPage();window.scrollTo(0,0);};pg.appendChild(b);}
}
document.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{
  const key=th.dataset.col;
  if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=true;}
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
  th.classList.add(sortAsc?'sort-asc':'sort-desc');
  filtered.sort((a,b)=>{const va=(a[key]||'').toLowerCase(),vb=(b[key]||'').toLowerCase();return sortAsc?va.localeCompare(vb,undefined,{numeric:true}):vb.localeCompare(va,undefined,{numeric:true});});
  renderPage();
}));
function validateRules(){
  const vi=[];
  allData.forEach(r=>{const evs=[r.Event_1,r.Event_2,r.Event_3].filter(e=>e&&e.trim());if(evs.length>3)vi.push(r.Bib);});
  const ai=document.getElementById('alert-inner'),ad=document.getElementById('alerts');
  if(!vi.length){ai.textContent='✅ All athletes validated: 1 school/club, max 3 events each.';ai.className='alert-ok';}
  else{ai.textContent=`🚨 ${vi.length} athlete(s) over 3 events: ${vi.slice(0,5).join(', ')}`;ai.className='alert-err';}
  ad.style.display='block';ad.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
